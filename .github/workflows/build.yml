---
name: Build and Test
on:
    push:
        branches: [main]
        tags: [v*]
    pull_request:
        branches: [main]
permissions: {}

jobs:
    build:
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      package-types: deb,rpm
                      no-strip: true
                    - os: windows-latest
                      package-types: msi
                      no-strip: false
                    - os: macos-latest
                      package-types: dmg
                      no-strip: false
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev libayatana-appindicator3-dev curl wget file libxdo-dev libssl-dev librsvg2-dev lld rpm

            - name: Import signing certificate
              if: runner.os == 'macOS'
              env:
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
              run: |
                  CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
                  KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
                  KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

                  echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"

                  security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

                  security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
                      -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
                  security set-key-partition-list -S apple-tool:,apple: \
                      -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
                  security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

            - name: Print Rust version
              run: rustc -vV

            - name: Install cargo-binstall
              if: runner.os == 'Windows'
              shell: pwsh
              run: Set-ExecutionPolicy Unrestricted -Scope Process; iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content

            - name: Install cargo-binstall
              if: runner.os != 'Windows'
              run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh
                  | bash

            - name: Install OpenSSL
              if: runner.os == 'macOS'
              run: brew install openssl@3

            - name: Install x86_64-apple-darwin toolchain
              if: runner.os == 'macOS'
              run: rustup target add x86_64-apple-darwin

            - name: Install Dioxus CLI
              run: cargo binstall dioxus-cli --no-confirm

            - name: Bundle app
              run: dx bundle --release --desktop --package-types "${{ matrix.package-types }}"
              env:
                  NO_STRIP: ${{ matrix.no-strip }}

            - name: Bundle app for macOS with x86_64 target
              if: runner.os == 'macOS'
              run: dx bundle --release --desktop --package-types "${{ matrix.package-types }}" --target x86_64-apple-darwin
              env:
                  NO_STRIP: ${{ matrix.no-strip }}

            - name: Notarize DMGs
              if: runner.os == 'macOS'
              env:
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
              run: |
                  API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
                  echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"

                  AARCH_DMG_PATH=$(find target/dx/pino/bundle/macos -name "*aarch64*.dmg" | head -1)
                  X86_DMG_PATH=$(find target/dx/pino/bundle/macos -name "*x86_64*.dmg" | head -1)

                  xcrun notarytool submit "$AARCH_DMG_PATH" \
                      --key "$API_KEY_PATH" \
                      --key-id "$APPLE_API_KEY" \
                      --issuer "$APPLE_API_ISSUER" \
                      --wait

                  xcrun stapler staple "$AARCH_DMG_PATH"

                  xcrun notarytool submit "$X86_DMG_PATH" \
                      --key "$API_KEY_PATH" \
                      --key-id "$APPLE_API_KEY" \
                      --issuer "$APPLE_API_ISSUER" \
                      --wait

                  xcrun stapler staple "$X86_DMG_PATH"

            - name: Upload artifacts (Linux)
              if: runner.os == 'Linux'
              uses: actions/upload-artifact@v7
              with:
                  name: pino-${{ runner.os }}
                  path: |
                      target/dx/pino/bundle/linux/deb/pino_*.deb
                      target/dx/pino/bundle/linux/rpm/pino-*.rpm

            - name: Upload artifacts (Windows)
              if: runner.os == 'Windows'
              uses: actions/upload-artifact@v7
              with:
                  name: pino-${{ runner.os }}
                  path: target/dx/pino/bundle/windows/msi/Pino_*.msi

            - name: Upload artifacts (macOS)
              if: runner.os == 'macOS'
              uses: actions/upload-artifact@v7
              with:
                  name: pino-${{ runner.os }}
                  path: target/dx/pino/bundle/macos/macos/Pino_*.dmg

            - name: Clean up keychain
              if: runner.os == 'macOS' && always()
              run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db"

    release:
        needs: build
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v8
              with:
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  generate_release_notes: true
                  files: |
                      artifacts/pino-Linux/*
                      artifacts/pino-Windows/*
                      artifacts/pino-macOS/*
